name: Build & Release

on:
  push:
    tags:
      - '[0-9]*.[0-9]*.[0-9]*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Extract version from tag
        id: version
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Building version: $TAG"

      - name: Restore dependencies
        run: dotnet restore ConverterSplitter/ConverterSplitter.csproj

      - name: Publish - Self-contained single file (win-x64)
        run: |
          dotnet publish ConverterSplitter/ConverterSplitter.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:Version=${{ steps.version.outputs.tag }} `
            -p:AssemblyVersion=${{ steps.version.outputs.tag }}.0 `
            -p:FileVersion=${{ steps.version.outputs.tag }}.0 `
            -o publish/win-x64

      - name: Publish - Framework-dependent (win-x64)
        run: |
          dotnet publish ConverterSplitter/ConverterSplitter.csproj `
            -c Release `
            -r win-x64 `
            --self-contained false `
            -p:PublishSingleFile=true `
            -p:Version=${{ steps.version.outputs.tag }} `
            -p:AssemblyVersion=${{ steps.version.outputs.tag }}.0 `
            -p:FileVersion=${{ steps.version.outputs.tag }}.0 `
            -o publish/win-x64-fdd

      - name: Create ZIP archives
        shell: pwsh
        run: |
          Compress-Archive -Path publish/win-x64/* -DestinationPath "ConverterSplitter-${{ steps.version.outputs.tag }}-win-x64-self-contained.zip"
          Compress-Archive -Path publish/win-x64-fdd/* -DestinationPath "ConverterSplitter-${{ steps.version.outputs.tag }}-win-x64.zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Converter Splitter v${{ steps.version.outputs.tag }}"
          tag_name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          draft: false
          prerelease: false
          files: |
            ConverterSplitter-${{ steps.version.outputs.tag }}-win-x64-self-contained.zip
            ConverterSplitter-${{ steps.version.outputs.tag }}-win-x64.zip
